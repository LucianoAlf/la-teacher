<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>LA Teacher</title>

    <!-- PWA / instalação no iPhone -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0A0F0E" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/icons/favicon-48.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="LA Teacher" />

    <!-- Descrição + card de compartilhamento (WhatsApp, redes). %OG_BASE_URL% é
         resolvido no build pela URL de produção (ver plugin no vite.config.ts). -->
    <meta name="description" content="Seu assistente pedagógico — chamada, gravação de aula e ficha do aluno, na palma da mão." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="LA Teacher" />
    <meta property="og:title" content="LA Teacher" />
    <meta property="og:description" content="Seu assistente pedagógico" />
    <meta property="og:url" content="%OG_BASE_URL%/" />
    <meta property="og:image" content="%OG_BASE_URL%/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="LA Teacher — Seu assistente pedagógico" />
    <meta property="og:locale" content="pt_BR" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LA Teacher" />
    <meta name="twitter:description" content="Seu assistente pedagógico" />
    <meta name="twitter:image" content="%OG_BASE_URL%/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Prompt:wght@900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
